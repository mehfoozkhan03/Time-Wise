<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Thought of the day Popup</title>
    <link rel="stylesheet" href="./css/thoughtPopup.css">
    <script src="./js/thoughtPopup.js" defer></script>
</head>

<body>

     <header class="header">

  </header>
    <div class="thought-popup-container">
        <div class="user-info">
            <img src="./css/utils/img/profile_avtar.avif" alt="user-profile img">
            <div>
                <p>Welcome, User Name 👋</p>
                <p>Share your thoughts with the world</p>
            </div>
        </div>
        <div class="thought-card">
            <textarea name="thought" id="textarea" placeholder="Share your thought..."></textarea>
            <div>
                <p class="word-counter">0/250</p>
                <div class="btns">
                    <div class="post-thought-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                        <button onclick="thought(event)">Post Thought</button>
                    </div>
                    <a href="./Home.html"><button>Skip</button></a>
                </div>
            </div>
        </div>
    </div>

    <div class="success-msg-popup">
        <div>
            <i class="bi bi-check-circle"></i>
        </div>
        <div>
            <h3>Thought Posted Successfully!</h3>
            <p>Your thought has been shared. Thank you for contributing to our community!</p>
        </div>
        <a href="./Home.html"><button>Continue</button></a>
    </div>

     
  <footer class="footer">
  
  </footer>
</body>


<script type="module">
  // RAHMAT CODE
  import { navbar, style, footer } from "./js/nav_footer.js";
  document.querySelector(".header").innerHTML = navbar();


  let styleTag = document.createElement("style");
  styleTag.textContent = style();
  document.head.append(styleTag);

  document.querySelector(".footer").innerHTML = footer();

  const navBar = document.querySelector(".navbar-container");
  const header = document.querySelector(".header");

  // when we scroll the webpage a little bit then both classes fixed & fixed-header will be added & when we go on the top of the webpage these classes will be removed
  window.addEventListener("scroll", () => {
    if (window.scrollY > 0) {
      navBar.classList.add("fixed");
      header.classList.add("fixed-header");
    } else {
      navBar.classList.remove("fixed");
      header.classList.remove("fixed-header");
    }
  });

  // scroll button
  const scrollBtn = document.querySelector(".fa-angle-up");

  window.addEventListener("scroll", () => {
    if (window.scrollY > 100) {
      scrollBtn.classList.add("showScrollBtn");
    } else {
      scrollBtn.classList.remove("showScrollBtn");
    }
  });

  window.scrollUp = function () {
    window.scrollTo({
      top: 0,
      behavior: "smooth",
    });
  };


</script>
</html>
