<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought Admin Section</title>
    <link rel="stylesheet" href="./css/AdminThought.css">
    <script src="./js/AdminThought.js" defer></script>
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

</head>

<body>

     <header class="header">

  </header>

    <section class="admin-thought-section">
           <h1 class="admin-thoughtheading">admin-thought</h1>
        <div class="admin-thought-content">

            <!-- thought header -->
            <div class="thoughts-header">
                <h3>Thoughts & Reflections</h3>
                <div class="thoughts-filter">
                    <select class="thoughts-dropdown">
                        <option value="All Thoughs">All Thoughts</option>
                        <option value="Featured">Featured</option>
                        <option value="Recent">Recent</option>
                    </select>
                    <button class="addThought-btn">+ Add Thought</button>
                </div>
            </div>

            <!-- thought input section -->
            <div class="thoughts-input-area">
                <input type="text" class="thought-input" placeholder="Share your though about your work day...">
                <div class="thought-actions">
                    <button class="cancel-btn">Cancel</button>
                    <button class="share-btn" onclick="addAdminThought()">Share Thought</button>
                </div>
            </div>
        </div>


        <!-- thought card -->
        <div class="admin-thought-card">
        </div>
    </section>

     <footer class="footer">
  
  </footer>
</body>

<script type="module">
  // RAHMAT CODE
  import { navbar, style, footer } from "./js/nav_footer.js";
  document.querySelector(".header").innerHTML = navbar();


  let styleTag = document.createElement("style");
  styleTag.textContent = style();
  document.head.append(styleTag);

  document.querySelector(".footer").innerHTML = footer();

  const navBar = document.querySelector(".navbar-container");
  const header = document.querySelector(".header");

  // when we scroll the webpage a little bit then both classes fixed & fixed-header will be added & when we go on the top of the webpage these classes will be removed
  window.addEventListener("scroll", () => {
    if (window.scrollY > 0) {
      navBar.classList.add("fixed");
      header.classList.add("fixed-header");
    } else {
      navBar.classList.remove("fixed");
      header.classList.remove("fixed-header");
    }
  });

  // scroll button
  const scrollBtn = document.querySelector(".fa-angle-up");

  window.addEventListener("scroll", () => {
    if (window.scrollY > 100) {
      scrollBtn.classList.add("showScrollBtn");
    } else {
      scrollBtn.classList.remove("showScrollBtn");
    }
  });

  window.scrollUp = function () {
    window.scrollTo({
      top: 0,
      behavior: "smooth",
    });
  };


</script>

</html>
